---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "podium.fullname" . }}-projects
  labels:
    {{- include "podium.labels" . | nindent 4 }}
    app.kubernetes.io/component: projects-service
spec:
  replicas: {{ .Values.projectsService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "podium.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: projects-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "podium.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: projects-service
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: projects-service
          image: {{ include "podium.image" (dict "root" . "svc" .Values.projectsService "name" "projects-service") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.projectsService.port }}
              protocol: TCP
          env:
            {{- include "podium.commonEnv" . | nindent 12 }}
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "podium.fullname" . }}-config
                  key: AWS_REGION
            - name: R2_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "podium.fullname" . }}-config
                  key: R2_BUCKET_NAME
            - name: R2_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "podium.fullname" . }}-config
                  key: R2_PUBLIC_URL
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "podium.fullname" . }}-secrets
                  key: R2_ACCOUNT_ID
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "podium.fullname" . }}-secrets
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "podium.fullname" . }}-secrets
                  key: R2_SECRET_ACCESS_KEY
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.projectsService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "podium.fullname" . }}-projects
  labels:
    {{- include "podium.labels" . | nindent 4 }}
    app.kubernetes.io/component: projects-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "podium.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: projects-service
  ports:
    - name: http
      port: {{ .Values.projectsService.port }}
      targetPort: http
      protocol: TCP
