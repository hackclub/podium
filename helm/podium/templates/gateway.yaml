{{- if .Values.gateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "podium.fullname" . }}-gateway
  labels:
    {{- include "podium.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "podium.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "podium.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "podium.image" (dict "root" . "svc" .Values.gateway "name" "gateway") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          env:
            - name: GATEWAY_PORT
              value: {{ .Values.gateway.port | quote }}
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "podium.fullname" . }}-config
                  key: AUTH_SERVICE_URL
            - name: EVENTS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "podium.fullname" . }}-config
                  key: EVENTS_SERVICE_URL
            - name: PROJECTS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "podium.fullname" . }}-config
                  key: PROJECTS_SERVICE_URL
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "podium.fullname" . }}-config
                  key: FRONTEND_URL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "podium.fullname" . }}-gateway
  labels:
    {{- include "podium.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "podium.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: http
      protocol: TCP
{{- end }}
